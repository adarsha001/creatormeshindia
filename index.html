<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Update Template</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'Inter',sans-serif;
}

.card {
  width:420px;
  background:#1b0d35;
  overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
  position:relative;
}

.hero {
  position:relative;
  height:550px;
}

.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.55);
}

.overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,0.1), #1b0d35);
}

/* LOGO */
.logo {
  position:absolute;
  top:18px;
  left:18px;
  z-index:5;
}

.logo img {
  width:36px;
  height:36px;
  border-radius:8px;
}

/* CONTENT */
.content {
  position:absolute;
  bottom:70px; /* moved up to make space for footer */
  padding:20px;
  z-index:5;
}

.headline {
  font-size:26px;
  font-weight:900;
  color:#fff;
  line-height:1.2;
  margin-bottom:10px;
}

.subtext {
  font-size:13px;
  color:rgba(255,255,255,0.7);
  line-height:1.5;
  white-space: pre-line;
}

/* FOOTER LINE */
.footer-line {
  position:absolute;
  bottom:45px;
  left:20px;
  right:20px;
  height:1px;
  background:rgba(255,255,255,0.15);
  z-index:6;
}

/* FOOTER */
.footer {
  position:absolute;
  bottom:12px;
  left:20px;
  right:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:6;
}

.footer-left {
  color:rgba(255,255,255,0.6);
  font-size:11px;
  font-weight:600;
  letter-spacing:0.5px;
}

.footer-right {
  display:flex;
  gap:12px;
}

.footer-right img {
  width:16px;
  height:16px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="card">
  <div class="hero">

    <img id="image" src="https://res.cloudinary.com/djby6s10a/image/upload/v1776752558/properties/rw6vcqypvoindof3oylo.png" />

    <div class="overlay"></div>

    <!-- LOGO -->
    <div class="logo">
      <img src="https://res.cloudinary.com/dq32mhbbt/image/upload/v1776751976/Untitled_900_x_1536_px_800_x_800_px_ntonbn.png" />
    </div>

    <!-- TEXT -->
    <div class="content">
      <div class="headline" id="headline">
        Do you think more followers mean better engagement? Think again.
      </div>
      <div class="subtext" id="subtext">
Your followers aren’t always real.
Influencers inflate numbers with bots.
Engagement looks good, but it’s fake.
      </div>
    </div>

    <!-- DIVIDER -->
    <div class="footer-line"></div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="footer-left">JOIN CREATORMESHINDIA</div>

      <div class="footer-right">
        <!-- Instagram -->
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" />

        <!-- Facebook -->
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" />

        <!-- YouTube -->
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" />
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);

  function setText(id, value) {
    const el = document.getElementById(id);
    if (el && value) el.innerText = value;
  }

  function setImage(url) {
    const img = document.getElementById("image");
    if (img && url) img.src = url;
  }

  const hook  = params.get("hook");
  const body  = params.get("body");
  const image = params.get("imageUrl");

  if (hook)  setText("headline", hook);
  if (body)  setText("subtext", body);
  if (image) setImage(image);

})();
</script>

</body>
</html>
