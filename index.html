<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Update Template</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:'Inter',sans-serif;
  }

  .card {
    width:420px;
    background:#1b0d35;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.6);
    position:relative;
  }

  .hero {
    position:relative;
    height:420px;
  }

  .hero img {
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.55);
  }

  .overlay {
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0.1), #1b0d35);
  }

  /* LOGO TOP LEFT */
  .logo {
    position:absolute;
    top:18px;
    left:18px;
    z-index:5;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .logo img {
    width:36px;
    height:36px;
    border-radius:8px;

    padding:4px;
  }

  .logo span {
    color:white;
    font-size:12px;
    font-weight:700;
    line-height:1.2;
  }

  /* BADGE TOP RIGHT */
  .badge {
    position:absolute;
    top:18px;
    right:18px;
    background:#8b2fc9;
    color:#fff;
    font-size:11px;
    font-weight:700;
    padding:6px 14px;
    border-radius:6px;
    z-index:5;
  }

  .content {
    position:absolute;
    bottom:0;
    padding:20px;
    z-index:5;
  }

  .headline {
    font-size:26px;
    font-weight:900;
    color:#fff;
    line-height:1.2;
    margin-bottom:10px;
  }

  .subtext {
    font-size:13px;
    color:rgba(255,255,255,0.7);
    line-height:1.5;
  }

</style>
</head>
<body>

<div class="card">

  <div class="hero">
    <img id="image" src="https://res.cloudinary.com/dq32mhbbt/image/upload/v1776750665/Untitled_design_22_qimok5.png" />

    <div class="overlay"></div>

    <!-- LOGO -->
    <div class="logo">
      <img src="https://res.cloudinary.com/dq32mhbbt/image/upload/v1776751976/Untitled_900_x_1536_px_800_x_800_px_ntonbn.png" id="logoImg" />
 
    </div>

    <!-- BADGE -->

    <!-- TEXT -->
    <div class="content">
      <div class="headline" id="headline">Your headline here</div>
      <div class="subtext" id="subtext">Your subtext here</div>
    </div>

  </div>

</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);

  function setText(id, value) {
    const el = document.getElementById(id);
    if (el && value) el.innerText = value;
  }

  function setImage(url) {
    const img = document.getElementById("image");
    if (img && url) img.src = url;
  }



  const hook    = params.get("hook");
  const body    = params.get("body");
  const image   = params.get("imageUrl");
  const badge   = params.get("badge");


  if (hook)   setText("headline", hook);
  if (body)   setText("subtext", body);
  if (badge)  setText("badge", badge);
  if (image)  setImage(image);

})();
</script>

</body>
</html>
